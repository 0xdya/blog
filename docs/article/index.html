<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مقالة — المدوّنة · تحكم بالخطوط</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-size-root: 16px;
      --bg:        #0a0a0a;
      --bg-card:   #111111;
      --border:    #1f1f1f;
      --border-h:  #2e2e2e;
      --text:      #ededed;
      --muted:     #666;
      --muted-2:   #444;
      --accent:    #b87fff;
      --highlight-color: rgba(184, 127, 255, 0.3);
      --accent-dim: rgba(184,127,255,0.12);
      --font-ar:   'IBM Plex Sans Arabic', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-hand:   'Aref Ruqaa', sans-serif;
      --panel-bg: rgba(15,15,15,0.92);
      --hr-op: .2;
      --mark:    #e74c3c;
    }
    
    [data-theme="light"] {
      --bg:        #fafafa;
      --bg-card:   #f2f2f2;
      --border:    #e2e2e2;
      --border-h:  #c8c8c8;
      --text:      #111111;
      --muted:     #888;
      --muted-2:   #bbb;
      --accent:    #7c3aed;
      --highlight-color: rgba(124, 58, 237, 0.2);
      --accent-dim: rgba(124,58,237,0.08);
      --panel-bg: rgba(245,245,245,0.96);
      --hr-op: 1;
      --mark:    #4caf82;
    }
    
    html {
      font-size: var(--font-size-root, 16px);
      scroll-behavior: smooth;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ar);
      font-size: 1rem;
      line-height: 1.85;
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s;
    }

    ::selection {
      background-color: var(--text); 
      color: var(--bg);
    }

    #theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
      flex-shrink: 0;
    }
    #theme-toggle:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: var(--bg-card);
    }
    #theme-toggle svg { display: block; transition: opacity .2s; }
    .state {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 3rem 0;
    }
    
    .font-control-panel {
      position: fixed;
      z-index: 1000;
      background: var(--panel-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      padding: 0.75rem;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      font-family: var(--font-mono);
      top: 3.8rem;
      right: 50%;
      transform: translateX(50%);
      flex-direction: row;
      justify-content: center;
      align-items: center ;
      gap: 0.6rem;
      border-radius: 2rem;
      width: 85vw ;
      max-width: 800px;
      direction: ltr;
      margin: 0 auto;
    }

    .font-control-panel button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      width: 44px;
      height: 44px;
      border-radius: 2rem;
      cursor: pointer;
      display: inline-flex;
      flex-direction: row !important;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .font-control-panel button:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      margin: 0 4px;
      min-width: 72px;
      border-radius: 8px;
    }

    .font-control-panel .reset-btn {
      display: inline-block;
      justify-content: center;
      align-items: center;
      background: transparent;
      border-color: var(--muted-2);
      font-size: 1rem;
      letter-spacing: 0.5px;
      width: fit-content;
      padding: 0 1rem 8px;
    }

    .font-label {
      font-size: 0.65rem;
      color: var(--muted);
      position: fixed;
      right: 16px;
    }

    @media (max-width: 600px) {
      .font-label {
        display: none;
      }
    }

    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] nav  { background: rgba(250,250,250,0.85); }
    [data-theme="light"] footer { background: rgba(250,250,250,0.92); }
    [data-theme="light"] #article-body { color: #333; }
    [data-theme="light"] #article-body blockquote { background: #f0f0f0; color: #555; }
    [data-theme="light"] #article-body code { background: #ececec; color: #333; border-color: var(--border); }
    [data-theme="light"] #article-body pre  { background: #f0f0f0; }
    [data-theme="light"] #article-body pre code { color: #444; }

    nav {
      position: sticky;
      top: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav .back {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    nav .back:hover { color: var(--text); }
    nav .logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
    }
    nav .logo:hover { color: var(--text); }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .font-panel-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .font-panel-toggle:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: var(--bg-card);
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    .article-header {
      margin-bottom: 3rem;
    }
    .article-header .breadcrumb {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted-2);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .article-header .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    #article-title {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    .article-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .article-info .tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      background: #161616;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
    }
    .article-info .date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
    }
    #article-body { color: #c9c9c9; }
    #article-body h1,
    #article-body h2,
    #article-body h3,
    #article-body h4 {
      color: var(--text);
      font-weight: 600;
      margin: 2.5rem 0 .8rem;
      line-height: 1.4;
    }
    #article-body h1 { font-size: 1.6rem; 
      border-bottom: 1px solid var(--border);
    }
    #article-body h2 { font-size: 1.3rem; 
       padding-bottom: .5rem; }
    #article-body h3 { font-size: 1.1rem; }
    #article-body p { margin-bottom: 1.3rem; text-indent: 1rem; }
    p, li { text-align: justify; }
    #article-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    #article-body a:hover { border-color: var(--accent); }
    #article-body strong { color: var(--text); font-weight: 600; }
    #article-body ul,
    #article-body ol {
      padding-right: 14px;
      margin-bottom: 1.3rem;
    }
    #article-body blockquote {
      border-right: 3px solid var(--accent);
      padding: .8rem 1.2rem;
      margin: 1.5rem 0;
      background: #111;
      border-radius: 0 6px 6px 0;
      color: #999;
    }
    #article-body code {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      background: #151515;
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
    }
    #article-body pre {
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    #article-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.8rem;
    }
    #article-body mark {
      background: linear-gradient(0deg, var(--mark) 40%, transparent 40%);
      padding: 0 2px;
      color: var(--text);
    }
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: .9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(4px);
      border-top: 1px solid var(--border);
      z-index: 55;
    }
    .footer {
      padding: 2rem 0 0;
      text-align: center;
      font-family: var(--font-hand);
      font-size: 1.8rem;
      word-spacing: 8px;
      color: var(--muted);
      a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color .2s;
      }
    }
    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      main { padding: 2rem 1rem 5rem; }
    }
    hr {
      border: none;
      height: 40px;
      background: url("https://0xdya.vercel.app/img/hr3.webp") no-repeat center;
      background-size: contain;
      opacity: var(--hr-op);
    }
  </style>
</head>
<body>

<nav>
  <a href="../" class="back">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8H13M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    المدوّنة
  </a>
  <div class="nav-actions">
    <button id="fontPanelToggleBtn" class="font-panel-toggle" title="التحكم بحجم الخط" aria-label="فتح لوحة الخطوط">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
      </svg>
    </button>
    <button id="theme-toggle" title="تغيير الثيم" aria-label="تغيير الثيم">
      <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a href="../../" class="logo">~/home</a>
  </div>
</nav>

<main>
  <div id="content">
    <p class="state">جارٍ التحميل…</p>
  </div>
</main>

<footer>
  <span id="footer-slug" style="color:#333"></span>
  <span id="footer-year"></span>
</footer>

<div id="fontControlPanel" class="font-control-panel">
  <button id="fontDecrease" title="تصغير الخط">A⁻</button>
  <button id="fontReset" class="reset-btn" title="الحجم الطبيعي"> عادي</button>
  <button id="fontIncrease" title="تكبير الخط">A⁺</button>
  <div class="font-label">حجم الخط</div>
</div>

<script>
  (function(){
    const rootHtml = document.documentElement;
    const STORAGE_FONT_KEY = 'blog-font-size';
    const MIN_FONT = 12;
    const MAX_FONT = 24;
    const DEFAULT_FONT = 16;
    
    function getCurrentFontSize() {
      const computed = getComputedStyle(rootHtml).getPropertyValue('--font-size-root').trim();
      if (computed && computed.endsWith('px')) {
        return parseInt(computed, 10);
      }
      return DEFAULT_FONT;
    }
    
    function setFontSize(pxValue) {
      let newSize = Math.min(MAX_FONT, Math.max(MIN_FONT, pxValue));
      rootHtml.style.setProperty('--font-size-root', newSize + 'px');
      localStorage.setItem(STORAGE_FONT_KEY, newSize);
    }
    
    function increaseFont() {
      let current = getCurrentFontSize();
      setFontSize(current + 1);
    }
    
    function decreaseFont() {
      let current = getCurrentFontSize();
      setFontSize(current - 1);
    }
    
    function resetFont() {
      setFontSize(DEFAULT_FONT);
    }
    
    function restoreFontSize() {
      const saved = localStorage.getItem(STORAGE_FONT_KEY);
      if (saved !== null) {
        let size = parseInt(saved, 10);
        if (!isNaN(size) && size >= MIN_FONT && size <= MAX_FONT) {
          rootHtml.style.setProperty('--font-size-root', size + 'px');
          return;
        }
      }
      rootHtml.style.setProperty('--font-size-root', DEFAULT_FONT + 'px');
    }
    
    restoreFontSize();
    
    const increaseBtn = document.getElementById('fontIncrease');
    const decreaseBtn = document.getElementById('fontDecrease');
    const resetBtn = document.getElementById('fontReset');
    if(increaseBtn) increaseBtn.addEventListener('click', increaseFont);
    if(decreaseBtn) decreaseBtn.addEventListener('click', decreaseFont);
    if(resetBtn) resetBtn.addEventListener('click', resetFont);
    
    const panel = document.getElementById('fontControlPanel');
    const toggleBtn = document.getElementById('fontPanelToggleBtn');
    if(toggleBtn && panel) {
      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if(panel.style.display === 'none' || getComputedStyle(panel).display === 'none') {
          panel.style.display = 'flex';
        } else {
          panel.style.display = 'none';
        }
      });
    }
    if(panel) panel.style.display = 'none';
    
    const rootAttr = document.documentElement;
    const toggleThemeBtn = document.getElementById('theme-toggle');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    
    function applyTheme(theme) {
      rootAttr.setAttribute('data-theme', theme);
      localStorage.setItem('blog-theme', theme);
      if (theme === 'light') {
        if(iconSun) iconSun.style.display = 'none';
        if(iconMoon) iconMoon.style.display = 'block';
      } else {
        if(iconSun) iconSun.style.display = 'block';
        if(iconMoon) iconMoon.style.display = 'none';
      }
    }
    
    const savedTheme = localStorage.getItem('blog-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));
    
    if(toggleThemeBtn) {
      toggleThemeBtn.addEventListener('click', () => {
        const current = rootAttr.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    }
    
    const markExtension = {
      name: 'mark',
      level: 'inline',
      start(src) { return src.indexOf('=='); },
      tokenizer(src) {
        const match = src.match(/^==([^=]+)==/);
        if (match) return { type: 'mark', raw: match[0], text: match[1] };
      },
      renderer(token) {
        return `<mark>${token.text}</mark>`;
      }
    };
    marked.use({ extensions: [markExtension] });
    
    const ARTICLES_META = {
      save_your_self: { title: 'كيف تجعل اختراق حساباتك مستحيلاً؟', date: '2026-04-23', tag: 'تقني' },
    };
    
    function formatDate(str) {
      return new Date(str).toLocaleDateString('ar-DZ', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }
    
    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('a');
      const contentEl = document.getElementById('content');
      const footerSlug = document.getElementById('footer-slug');
      
      if (!slug) {
        contentEl.innerHTML = `<p class="state error">لم يُحدَّد مقال. استخدم ?a=اسم-المقال</p>`;
        return;
      }
      if (footerSlug) footerSlug.textContent = slug + '.md';
      
      try {
        const res = await fetch(`../md/${slug}.md`);
        if (!res.ok) throw new Error(`${res.status}`);
        const md = await res.text();
        const meta = ARTICLES_META[slug] || {};
        document.title = (meta.title || slug) + ' — المدوّنة';
        
        const firstHeading = md.match(/^#\s+(.+)/m)?.[1];
        const title = meta.title || firstHeading || slug;
        const cleanMd = meta.title ? md : md.replace(/^#\s+.+\n?/, '');
        
        contentEl.innerHTML = `
          <div class="article-header">
            <div class="breadcrumb">
              <a href="../../">الرئيسية</a>
              <span>/</span>
              <a href="../">المدوّنة</a>
              <span>/</span>
              <span>${title}</span>
            </div>
            <h1 id="article-title">${title}</h1>
            <div class="article-info">
              ${meta.tag ? `<span class="tag">${meta.tag}</span>` : ''}
              ${meta.date ? `<span class="date">${formatDate(meta.date)}</span>` : ''}
            </div>
          </div>
          <div id="article-body">${marked.parse(cleanMd)}</div>
          <div class="footer">
            صُنع وكُتب من طرف 
            <a href="../">ضياء الدين ملوك</a>
          </div>
        `;
      } catch (err) {
        contentEl.innerHTML = `<p class="state error">تعذّر تحميل المقالة "${slug}".</p>`;
      }
    }
    
    loadArticle();
    const yearSpan = document.getElementById('footer-year');
    if (yearSpan) yearSpan.textContent = new Date().getFullYear();
  })();
</script>
</body>
</html>
