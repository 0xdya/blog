<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مقالة — المدوّنة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- marked.js — تحويل Markdown إلى HTML -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg-card:   #111111;
      --border:    #1f1f1f;
      --border-h:  #2e2e2e;
      --text:      #ededed;
      --muted:     #666;
      --muted-2:   #444;
      --accent:    #b87fff;
      --highlight-color: rgba(184, 127, 255, 0.3);
      --accent-dim: rgba(184,127,255,0.12);
      --font-ar:   'IBM Plex Sans Arabic', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-hand:   'Aref Ruqaa', sans-serif;
    }

    /* ── LIGHT THEME ── */
    [data-theme="light"] {
      --bg:        #fafafa;
      --bg-card:   #f2f2f2;
      --border:    #e2e2e2;
      --border-h:  #c8c8c8;
      --text:      #111111;
      --muted:     #888;
      --muted-2:   #bbb;
      --accent:    #7c3aed;
      --highlight-color: rgba(124, 58, 237, 0.2);
      --accent-dim: rgba(124,58,237,0.08);
    }

    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] nav  { background: rgba(250,250,250,0.85); }
    [data-theme="light"] footer { background: rgba(250,250,250,0.92); }
    [data-theme="light"] #article-body { color: #333; }
    [data-theme="light"] #article-body blockquote { background: #f0f0f0; color: #555; }
    [data-theme="light"] #article-body code { background: #ececec; color: #333; border-color: var(--border); }
    [data-theme="light"] #article-body pre  { background: #f0f0f0; }
    [data-theme="light"] #article-body pre code { color: #444; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ar);
      font-size: 16px;
      line-height: 1.85;
      min-height: 100vh;
    }
    

::selection {
    background-color: var(--text); 
    color: var(--bg);
}
    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav .back {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    nav .back:hover { color: var(--text); }
    nav .back svg { flex-shrink: 0; }

    nav .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    nav .logo:hover { color: var(--text); }

    /* ── MAIN ── */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    /* ── ARTICLE META ── */
    .article-header {
      margin-bottom: 3rem;
    }

    .article-header .breadcrumb {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted-2);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .article-header .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    .article-header .breadcrumb a:hover { color: var(--text); }

    #article-title {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .article-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .article-info .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      background: #161616;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .article-info .date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .article-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── ARTICLE BODY (Markdown rendered) ── */
    #article-body { color: #c9c9c9; }

    #article-body h1,
    #article-body h2,
    #article-body h3,
    #article-body h4 {
      color: var(--text);
      font-weight: 600;
      letter-spacing: -0.015em;
      margin: 2.5rem 0 .8rem;
      line-height: 1.4;
    }
    #article-body h1 { font-size: 1.6rem; }
    #article-body h2 { font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: .5rem; }
    #article-body h3 { font-size: 1.1rem; }

    #article-body p { 
      margin-bottom: 1.3rem;
    }
    p, li {
      text-align: justify;
    }

    #article-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    #article-body a:hover { border-color: var(--accent); }

    #article-body strong { color: var(--text); font-weight: 600; }
    #article-body em { color: #aaa; font-style: normal;
    font-family: "JetBrains";
    }

    #article-body ul,
    #article-body ol {
      padding-right: 1.5rem;
      margin-bottom: 1.3rem;
    }
    #article-body li { margin-bottom: .4rem; }

    #article-body blockquote {
      border-right: 3px solid var(--accent);
      padding: .8rem 1.2rem;
      margin: 1.5rem 0;
      background: #111;
      border-radius: 0 6px 6px 0;
      color: #999;
      text-align: justify;
    }

    #article-body code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: #151515;
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      color: #ccc;
    }

    #article-body pre {
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    #article-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #bbb;
    }

    #article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    #article-body img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    #article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 14px;
    }
    #article-body th,
    #article-body td {
      padding: .6rem 1rem;
      border: 1px solid var(--border);
      text-align: right;
    }
    #article-body th { background: #111; color: var(--text); font-weight: 500; }

#article-body mark {
  display: inline;
    background: linear-gradient(0deg, var(--bg-card) 40%, transparent 40%);
    padding: 0 2px;
    color: var(--text);
}


    /* ── THEME TOGGLE ── */
    #theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
      flex-shrink: 0;
    }
    #theme-toggle:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: var(--bg-card);
    }
    #theme-toggle svg { display: block; transition: opacity .2s; }
    .state {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 3rem 0;
    }

    .state.error {
      color: #e05252;
    }

    /* ── BACK BUTTON (bottom) ── */
    .back-bottom {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .back-bottom:hover { color: var(--text); }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: .9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }
    .footer {
      padding: 2rem 0 0;
      text-align: center;
      font-family: var(--font-hand);
      font-size: 2rem;
      word-spacing: 8px;
      color: var(--muted);
      /* background: rgba(10,10,10,0.9); */
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      main { padding: 2.5rem 1rem 5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../" class="back">
    <!-- arrow right (RTL = back) -->
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8H13M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    المدوّنة
  </a>
  <div style="display:flex;align-items:center;gap:1rem;">
    <button id="theme-toggle" title="تغيير الثيم" aria-label="تغيير الثيم">
      <!-- sun icon (shown in dark mode) -->
      <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <!-- moon icon (shown in light mode) -->
      <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a href="../../" class="logo">~/home</a>
  </div>
</nav>

<main>
  <div id="content">
    <p class="state">جارٍ التحميل…</p>
  </div>
</main>

<footer>
  <span id="footer-slug" style="color:#333"></span>
  <span id="footer-year"></span>
</footer>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  /* ── THEME ── */
  const root = document.documentElement;
  const toggleBtn = document.getElementById('theme-toggle');
  const iconSun  = document.getElementById('icon-sun');
  const iconMoon = document.getElementById('icon-moon');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    localStorage.setItem('blog-theme', theme);
    if (theme === 'light') {
      iconSun.style.display  = 'none';
      iconMoon.style.display = 'block';
    } else {
      iconSun.style.display  = 'block';
      iconMoon.style.display = 'none';
    }
  }

  const saved = localStorage.getItem('blog-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved || (prefersDark ? 'dark' : 'light'));

  toggleBtn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  const markExtension = {
    name: 'mark',
    level: 'inline',
    start(src) { return src.indexOf('=='); },
    tokenizer(src) {
      const match = src.match(/^==([^=]+)==/);
      if (match) return { type: 'mark', raw: match[0], text: match[1] };
    },
    renderer(token) {
      return `<mark>${token.text}</mark>`;
    }
  };
  marked.use({ extensions: [markExtension] });

  const ARTICLES_META = {
    save_your_self: { title: 'كيف تجعل اختراق حساباتك مستحيلاً؟', date: '2026-04-23', tag: 'تقني' },
  };

  function formatDate(str) {
    return new Date(str).toLocaleDateString('ar-DZ', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('a');
    const contentEl = document.getElementById('content');

    if (!slug) {
      contentEl.innerHTML = `<p class="state error">لم يُحدَّد مقال. استخدم ?a=اسم-المقال</p>`;
      return;
    }

    document.getElementById('footer-slug').textContent = slug + '.md';

    try {
      const res = await fetch(`../md/${slug}.md`);
      if (!res.ok) throw new Error(`${res.status}`);

      const md = await res.text();
      const meta = ARTICLES_META[slug] || {};

      document.title = (meta.title || slug) + ' — المدوّنة';

      const firstHeading = md.match(/^#\s+(.+)/m)?.[1];
      const title = meta.title || firstHeading || slug;

      const cleanMd = meta.title ? md : md.replace(/^#\s+.+\n?/, '');

      contentEl.innerHTML = `
        <div class="article-header">
          <div class="breadcrumb">
            <a href="../../">الرئيسية</a>
            <span>/</span>
            <a href="../">المدوّنة</a>
            <span>/</span>
            <span>${title}</span>
          </div>
          <h1 id="article-title">${title}</h1>
          <div class="article-info">
            ${meta.tag ? `<span class="tag">${meta.tag}</span>` : ''}
            ${meta.date ? `<span class="date">${formatDate(meta.date)}</span>` : ''}
          </div>
        </div>

        <hr class="article-divider" />

        <div id="article-body">${marked.parse(cleanMd)}</div>

        <div class="footer">
          صُنع وكُتب من طرف 
          <a href="../">
            ضياء الدين ملوك
        </a>
        </div>
      `;

    } catch (err) {
      contentEl.innerHTML = `
        <p class="state error">
          تعذّر تحميل المقالة "${slug}".
        </p>
      `;
    }
  }

  loadArticle();
</script>
</body>
</html>
