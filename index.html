<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدوّنة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg-card:   #111111;
      --border:    #1f1f1f;
      --border-h:  #2e2e2e;
      --text:      #ededed;
      --muted:     #666;
      --accent:    #e8ff5a;
      --font-ar:   'IBM Plex Sans Arabic', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ar);
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color .2s;
    }
    nav .logo:hover { color: var(--text); }

    nav .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    nav .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    nav .nav-links a:hover { color: var(--text); }

    /* ── MAIN ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem 8rem;
    }

    /* ── HEADER ── */
    .page-header {
      margin-bottom: 3.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: .5rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 14px;
    }

    /* ── ARTICLES LIST ── */
    #articles-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .article-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: border-color .2s;
    }

    .article-item:first-child { border-top: 1px solid var(--border); }

    .article-item:hover { border-color: var(--border-h); }
    .article-item:hover .article-title { color: var(--accent); }

    .article-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      transition: color .2s;
      flex: 1;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .article-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      background: #161616;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .article-date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      color: var(--muted);
      font-size: 13px;
      padding: 2rem 0;
      font-family: var(--font-mono);
    }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      padding: .9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }

    footer span { color: #333; }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      main { padding: 2.5rem 1rem 6rem; }
      .article-item { flex-direction: column; gap: .4rem; }
      .article-meta { flex-direction: row-reverse; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../" class="logo">~/home</a>
  <ul class="nav-links">
    <li><a href="./">المدوّنة</a></li>
  </ul>
</nav>

<main>
  <div class="page-header">
    <h1>المدوّنة</h1>
    <p id="article-count" class="state-msg">جارٍ التحميل…</p>
  </div>

  <div id="articles-list"></div>
</main>

<footer>
  <span>blog</span>
  <span id="footer-year"></span>
</footer>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  const ARTICLES = [
    {
      slug:  'save_your_self',
      title: 'كيفاش تحمي نفسك من اختراء حسابك ويولي ',
      date:  '2025-04-19',
      tag:   'تقني'
    }
  ];

  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('ar-DZ', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function render() {
    const list = document.getElementById('articles-list');
    const count = document.getElementById('article-count');

    if (!ARTICLES.length) {
      count.textContent = 'لا توجد مقالات بعد.';
      return;
    }

    const sorted = [...ARTICLES].sort((a, b) => new Date(b.date) - new Date(a.date));

    count.textContent = `${sorted.length} ${sorted.length === 1 ? 'مقالة' : 'مقالات'}`;

    list.innerHTML = sorted.map(a => `
      <a class="article-item" href="./article/?a=${a.slug}">
        <span class="article-title">${a.title}</span>
        <span class="article-meta">
          ${a.tag ? `<span class="article-tag">${a.tag}</span>` : ''}
          <span class="article-date">${formatDate(a.date)}</span>
        </span>
      </a>
    `).join('');
  }

  render();
</script>
</body>
</html>
